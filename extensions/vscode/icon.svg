<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E3C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ECC71;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 64 10 L 100 25 L 100 60 Q 100 90 64 110 Q 28 90 28 60 L 28 25 Z" 
        fill="url(#shieldGradient)" 
        stroke="#2C5F8D" 
        stroke-width="2"/>
  
  <!-- AI Circuit pattern inside shield -->
  <g opacity="0.9">
    <!-- Central node -->
    <circle cx="64" cy="55" r="6" fill="url(#aiGradient)"/>
    
    <!-- Top nodes -->
    <circle cx="50" cy="40" r="4" fill="url(#aiGradient)"/>
    <circle cx="78" cy="40" r="4" fill="url(#aiGradient)"/>
    
    <!-- Bottom nodes -->
    <circle cx="50" cy="70" r="4" fill="url(#aiGradient)"/>
    <circle cx="78" cy="70" r="4" fill="url(#aiGradient)"/>
    
    <!-- Connecting lines -->
    <line x1="64" y1="55" x2="50" y2="40" stroke="#50E3C2" stroke-width="2" opacity="0.8"/>
    <line x1="64" y1="55" x2="78" y2="40" stroke="#50E3C2" stroke-width="2" opacity="0.8"/>
    <line x1="64" y1="55" x2="50" y2="70" stroke="#50E3C2" stroke-width="2" opacity="0.8"/>
    <line x1="64" y1="55" x2="78" y2="70" stroke="#50E3C2" stroke-width="2" opacity="0.8"/>
    
    <!-- Horizontal connections -->
    <line x1="50" y1="40" x2="78" y2="40" stroke="#50E3C2" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="70" x2="78" y2="70" stroke="#50E3C2" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Lock symbol at bottom -->
  <g transform="translate(64, 85)">
    <rect x="-6" y="0" width="12" height="10" rx="1" fill="#FFF" opacity="0.9"/>
    <path d="M -4 0 L -4 -4 Q -4 -7 0 -7 Q 4 -7 4 -4 L 4 0" 
          fill="none" 
          stroke="#FFF" 
          stroke-width="2" 
          opacity="0.9"/>
  </g>
</svg>
